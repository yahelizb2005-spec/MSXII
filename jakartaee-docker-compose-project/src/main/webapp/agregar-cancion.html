<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS XII - Agregar cancion</title>
    <link rel="stylesheet" href="css/styles.css?v=20">
</head>
<body>
    <main class="page library-page">
        <section class="window library-window form-window" aria-label="Agregar cancion">
            <div class="app-topbar">
                <a class="brand-link" href="home.html">
                    <img src="img/ms-xii-logo.png" alt="">
                    <span>MS XII <em>Music</em></span>
                </a>
                <nav class="session-actions" aria-label="Navegacion">
                    <a class="button tiny" href="home.html">Inicio</a>
                    <a class="button tiny" href="biblioteca.html">Mi Biblioteca</a>
                    <a class="button tiny" href="index.html" data-logout>Cerrar sesion</a>
                </nav>
            </div>

            <div class="library-heading">
                <h1>Agregar Cancion</h1>
            </div>

            <form class="music-form" data-song-form>
                <label>Titulo <input type="text" name="title" required></label>
                <label>Artista <input type="text" name="artist" required></label>
                <label>Album (opcional) <input type="text" name="album"></label>
                <label>Ano (opcional) <input type="number" name="year" min="1900" max="2100"></label>
                <label>Etiquetas <input type="text" name="tags" placeholder="rock, 2024, anime"></label>
                <label>Enlace <input type="text" name="url" placeholder="https://youtube.com/..."></label>
                <label>Imagen de portada <input type="file" name="cover" accept="image/*" data-cover-input></label>
                <div class="cover-preview" data-cover-preview tabindex="0">Sin foto</div>
                <input type="hidden" name="coverData" data-cover-data>
                <button class="button tiny" type="button" data-paste-cover>Pegar imagen</button>
                <button class="button small" type="submit">Agregar a mi biblioteca</button>
                <p class="form-message" data-message aria-live="polite"></p>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        &copy; 2026 MS XII &mdash; Sistema desarrollado por YH3 | Agregar cancion
    </footer>
    <script src="js/app.js?v=26"></script>
</body>
</html>
