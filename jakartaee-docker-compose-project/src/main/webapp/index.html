<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS XII - Inicio</title>
    <link rel="stylesheet" href="css/styles.css?v=18">
</head>
<body>
    <main class="page">
        <section class="login-layout" aria-label="Inicio de sesi&oacute;n">
            <img class="hero-logo" src="img/ms-xii-logo-white.png" alt="MS XII">

            <div class="window">
                <div class="topbar">
                    <span></span>
                    <h1 class="title admin-title-link"><a href="admin-login.html">Inicio de sesi&oacute;n como Admin &gt;</a></h1>
                    <span></span>
                </div>

                <form class="form-stack" data-login-form>
                    <label class="field">
                        <span><img src="img/sobre.png" alt=""></span>
                        <input type="email" name="email" placeholder="Correo Electr&oacute;nico" autocomplete="email">
                    </label>

                    <label class="field">
                        <span>&#128274;</span>
                        <input type="password" name="password" placeholder="Contrase&ntilde;a" autocomplete="current-password">
                    </label>

                    <p class="form-message" data-message aria-live="polite"></p>

                    <div class="button-row">
                        <button class="button" type="submit">Iniciar Sesi&oacute;n</button>
                        <a class="button" href="register.html">Registrar nuevo usuario</a>
                        <a class="recovery-link" href="cambiar-contrasena.html">Restablecer contrasena</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        &copy; 2026 MS XII &mdash; Sistema desarrollado por YH3 | Todos los derechos reservados
    </footer>
    <script src="js/app.js?v=24"></script>

</html>
