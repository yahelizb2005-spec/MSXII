<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS XII - Agregar album</title>
    <link rel="stylesheet" href="css/styles.css?v=18">
</head>
<body>
    <main class="page library-page">
        <section class="window library-window form-window" aria-label="Agregar album">
            <div class="app-topbar">
                <a class="brand-link" href="home.html">
                    <img src="img/ms-xii-logo.png" alt="">
                    <span>MS XII <em>Music</em></span>
                </a>
                <nav class="session-actions" aria-label="Navegacion">
                    <a class="button tiny" href="home.html">Inicio</a>
                    <a class="button tiny" href="biblioteca.html">Mi Biblioteca</a>
                    <a class="button tiny" href="index.html" data-logout>Cerrar sesion</a>
                </nav>
            </div>

            <div class="library-heading">
                <h1>Agregar Album</h1>
            </div>

            <form class="music-form" data-album-form autocomplete="off">
                <label>Nombre del album <input type="text" name="name" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
                <label>Artista <input type="text" name="artist" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
                <label>Ano (opcional) <input type="number" name="year" min="1900" max="2100" autocomplete="off"></label>
                <label>Enlace del album <input type="text" name="link" placeholder="Spotify, YouTube, Apple Music..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
                <label>Etiquetas <input type="text" name="tags" placeholder="rock, directo, 2024" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></label>
                <label>Foto de portada <input type="file" name="cover" accept="image/*" data-cover-input></label>
                <div class="cover-preview" data-cover-preview tabindex="0">Sin foto</div>
                <button class="button tiny" type="button" data-paste-cover>Pegar imagen</button>
                <div class="songs-editor" data-songs-editor>
                    <span class="editor-label">Canciones</span>
                    <div class="song-fields" data-song-fields>
                        <div class="song-field"><span>Cancion 1</span><input type="text" name="albumSong" placeholder="Titulo de la cancion" aria-label="Titulo de la cancion 1" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"><input type="text" name="albumSongTags" placeholder="Etiquetas de esta cancion" aria-label="Etiquetas de la cancion 1" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>
                    </div>
                    <button class="button tiny" type="button" data-add-song-field>Agregar cancion</button>
                </div>
                <button class="button small" type="submit">Crear album</button>
                <p class="form-message" data-message aria-live="polite"></p>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        &copy; 2026 MS XII &mdash; Sistema desarrollado por YH3 | Agregar album
    </footer>
    <script src="js/app.js?v=24"></script>
</body>
</html>
