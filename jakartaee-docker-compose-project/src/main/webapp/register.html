<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS XII - Registro</title>
    <link rel="stylesheet" href="css/styles.css?v=1">
</head>
<body>
    <main class="page">
        <section class="window compact" aria-label="Registrar nuevo usuario">
            <div class="topbar centered">
                <span></span>
                <h1 class="title">Registrar nuevo usuario &mdash; MS XII</h1>
                <span></span>
            </div>

            <form class="form-stack" data-register-form>
                <label class="field">
                    <span><img src="img/sobre.png" alt=""></span>
                    <input type="email" name="email" placeholder="Correo Electr&oacute;nico" autocomplete="email">
                </label>

                <label class="field">
                    <span>&#128274;</span>
                    <input type="password" name="password" placeholder="Contrase&ntilde;a" autocomplete="new-password">
                </label>

                <label class="field">
                    <span>&#128273;</span>
                    <input type="text" name="keyword" placeholder="Crear palabra clave">
                </label>

                <p class="form-message" data-message aria-live="polite"></p>

                <div class="button-row">
                    <button class="button" type="submit">Registrar Usuario</button>
                    <a class="button small" href="index.html">Volver</a>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        &copy; 2026 MS XII &mdash; Sistema desarrollado por YH3 | Registro de nuevos usuarios
    </footer>
    <script src="js/app.js?v=24"></script>
</body>
</html>
